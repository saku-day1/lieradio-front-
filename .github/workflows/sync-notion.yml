name: Notion へエピソードを同期

# このワークフローは refresh-meta.yml とは完全に独立しています。
# 失敗しても Vercel デプロイや JSON 生成には一切影響しません。

on:
  workflow_dispatch:
    inputs:
      from_json:
        description: "true=ローカルJSONファイルを使用（API不要）/ false=Google Sheets+YouTubeをリアルタイム取得"
        required: false
        default: "false"
      limit:
        description: "同期件数上限（テスト用のみ。空欄=全件）"
        required: false
        default: ""
      dry_run:
        description: "true にすると Notion への書き込みをスキップしてログだけ確認"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  sync-notion:
    name: Google Sheets → Notion 同期
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 依存関係インストール
        run: npm ci

      - name: Notion 同期実行
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GOOGLE_SHEETS_API_KEY: ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SHEETS_SHEET_GID: ${{ secrets.GOOGLE_SHEETS_SHEET_GID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
          FROM_JSON: ${{ inputs.from_json }}
          SYNC_LIMIT: ${{ inputs.limit }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: node scripts/sync-notion.mjs
