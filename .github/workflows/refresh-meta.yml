name: メタ情報を今すぐ反映

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "実行理由（任意）"
        required: false
        default: "手動更新"

permissions: {}

jobs:
  refresh:
    name: キャッシュをクリアして Google Sheets から再取得
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: /api/episode-meta のキャッシュを破棄
        run: |
          BODY=$(curl -s -w "\n%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_APP_URL }}/api/episode-meta?refresh=1")
          STATUS=$(echo "$BODY" | tail -1)
          RESPONSE=$(echo "$BODY" | head -c 2000)
          echo "HTTP status: $STATUS"
          echo "レスポンス先頭 2000 文字:"
          echo "$RESPONSE"
          if [ "$STATUS" != "200" ]; then
            echo "::error::キャッシュ更新に失敗しました（HTTP $STATUS）"
            exit 1
          fi
          ENTRY_COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d))" 2>/dev/null || echo "不明")
          echo "取得エントリ数: $ENTRY_COUNT"
          echo "キャッシュを正常に更新しました。"
