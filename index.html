<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liella! リエラジ出演者検索</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="site-header">
    <h1>Liella!のリエラジ出演者検索</h1>
    <p class="subtitle">出演者検索 / 出演回数ランキング / YouTubeリンク</p>
  </header>

  <main class="container">
    <section class="controls card">
      <div class="control-group">
        <label>出演者ボタンで検索</label>
        <div id="castQuickFilters" class="cast-quick-filters"></div>
        <div id="unitQuickFilters" class="unit-quick-filters"></div>
        <button id="resetFiltersButton" type="button" class="reset-filters-button hidden">検索リセット</button>
      </div>

      <div class="control-group">
        <label for="sortSelect">並び順</label>
        <select id="sortSelect">
          <option value="desc">新しい順</option>
          <option value="asc">古い順</option>
        </select>
      </div>
    </section>

    <section id="rankingSection" class="card">
      <div class="section-header">
        <h2 id="rankingTitle">出演回数ランキング</h2>
        <button id="toggleRankingButton" type="button" class="toggle-button">表示する</button>
      </div>
      <ol id="rankingList" class="ranking-list hidden"></ol>
    </section>

    <section class="card">
      <h2 id="resultTitle">検索結果</h2>
      <p id="resultCount" class="result-count"></p>
      <ul id="episodeList" class="episode-list"></ul>
    </section>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
