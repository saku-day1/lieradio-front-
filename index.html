<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リエラジ出演者検索</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="site-header">
    <h1>リエラジ出演者検索</h1>
    <p class="subtitle">あなたの好きな回を見つけよう！</p>
    <ul class="feature-list">
      <li>メンバー選択</li>
      <li>ユニット検索</li>
      <li>AND絞り込み（最大5人）</li>
      <li>出演回数・共演者ランキング</li>
      <li>♡ お気に入り / ✓ 視聴済み管理</li>
    </ul>
  </header>

  <main class="container">
    <section class="controls card">
      <div class="control-group">
        <div id="castQuickFilters" class="cast-quick-filters"></div>
        <p id="castSelectionNotice" class="selection-notice hidden">出演者は最大5人まで選択できます。</p>
        <div id="unitQuickFilters" class="unit-quick-filters"></div>
        <button id="favoritesFilterButton" type="button" class="favorites-filter-button">♡ お気に入り</button>
        <button id="watchedFilterButton" type="button" class="watched-filter-button">✓ 視聴済み</button>
        <button id="unwatchedFilterButton" type="button" class="watched-filter-button">○ 未視聴</button>
        <button id="otherVideoFilterButton" type="button" class="other-video-filter-button">📼 その他の動画</button>
        <button id="resetFiltersButton" type="button" class="reset-filters-button hidden">検索リセット</button>
      </div>
    </section>

    <section id="rankingSection" class="card">
      <div class="section-header">
        <h2 id="rankingTitle">出演回数ランキング</h2>
        <button id="toggleRankingButton" type="button" class="toggle-button">表示する</button>
      </div>
      <ol id="rankingList" class="ranking-list hidden"></ol>
    </section>

    <section id="resultsSection" class="card">
      <div class="section-header">
        <h2 id="resultTitle">検索結果</h2>
        <div class="results-header-actions">
          <div class="results-sort-control">
            <label for="sortSelect">並び順</label>
            <select id="sortSelect">
              <option value="desc">新しい順</option>
              <option value="asc">古い順</option>
            </select>
          </div>
          <button id="toggleEpisodeListButton" type="button" class="toggle-button">表示する</button>
        </div>
      </div>
      <div id="episodeResultsCollapsible" class="episode-results-collapsible hidden">
        <p id="resultCount" class="result-count"></p>
        <ul id="episodeList" class="episode-list"></ul>
      </div>
    </section>
  </main>

  <!-- 文言は運営側で必要に応じて調整してください -->
  <footer class="site-footer">
    <p>
      本サイトはファンによる非公式の検索・索引サイトです。公式および関連会社とは一切関係ありません。
    </p>
    <p>
      番組・キャラクター・楽曲等に関する権利は各権利者に帰属します。動画の視聴はリンク先（YouTube 等）の規約および各コンテンツの権利者に従ってください。
    </p>
  </footer>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
